<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeatAQ - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .project-selection {
            display: none;
        }

        .project-selection.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>HeatAQ</h1>
            <p>Pool Energy Design</p>
        </div>

        <div class="alert alert-error" id="error-message"></div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <!-- Project Selection (hidden initially) -->
        <div class="project-selection" id="project-selection">
            <div class="form-group">
                <label for="project">Select Project</label>
                <select id="project" name="project">
                    <option value="">-- Select a project --</option>
                </select>
            </div>

            <button type="button" class="btn" id="select-project-btn">Continue</button>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let availableProjects = [];

        // Login form submission
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('login_api.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'login',
                        email,
                        password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentUserId = data.user_id;
                    availableProjects = data.projects;

                    // Hide login form, show project selection
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('project-selection').classList.add('show');

                    // Populate project dropdown
                    const projectSelect = document.getElementById('project');
                    projectSelect.innerHTML = '<option value="">-- Select a project --</option>';

                    data.projects.forEach(project => {
                        const option = document.createElement('option');
                        option.value = project.project_id;
                        option.textContent = `${project.project_name} (${project.site_name})`;
                        projectSelect.appendChild(option);
                    });

                } else {
                    showError(data.error || 'Login failed');
                }

            } catch (error) {
                showError('Connection error: ' + error.message);
            }
        });

        // Project selection
        document.getElementById('select-project-btn').addEventListener('click', async () => {
            const projectId = document.getElementById('project').value;

            if (!projectId) {
                showError('Please select a project');
                return;
            }

            try {
                const response = await fetch('login_api.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'select_project',
                        user_id: currentUserId,
                        project_id: projectId
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Store session information
                    localStorage.setItem('session_id', data.session_id);
                    localStorage.setItem('user_name', data.user_name);
                    localStorage.setItem('project_name', data.project_name);
                    localStorage.setItem('site_id', data.site_id);
                    localStorage.setItem('role', data.role);

                    // Redirect to main application
                    window.location.href = 'index.html';

                } else {
                    showError(data.error || 'Project selection failed');
                }

            } catch (error) {
                showError('Connection error: ' + error.message);
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');

            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
